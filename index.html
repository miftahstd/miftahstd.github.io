<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Product Photoshoot Studio</title>
    <style>
        :root {
            --bg-color: #0f1115;
            --panel-bg: #1a1d24;
            --primary: #00ffff;
            --primary-glow: rgba(0, 255, 255, 0.4);
            --text-main: #ffffff;
            --text-muted: #8b92a5;
            --border-color: #2a2e39;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary-glow);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .panel h2 {
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: var(--text-main);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background-color: rgba(0, 255, 255, 0.05);
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .preview-image {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            display: none;
            margin: 0 auto;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }

        select:focus, input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px var(--primary-glow);
        }

        /* Generate Button */
        .btn-generate {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-generate:hover {
            background: var(--primary);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .btn-generate:disabled {
            border-color: var(--text-muted);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
            background: transparent;
        }

        /* Results Area */
        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .result-card {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .result-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .loader {
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>AI Product Studio</h1>
        <p style="color: var(--text-muted);">Ubah foto produk biasa menjadi kampanye visual profesional</p>
    </div>

    <div class="container">
        <div class="panel">
            <h2>1. Setup Produk & Model</h2>
            
            <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept="image/*" onchange="handleImageUpload(event)">
                <div id="uploadText">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" style="margin-bottom: 10px;">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                    </svg>
                    <p>Klik atau Drag & Drop Gambar Produk Di Sini</p>
                </div>
                <img id="imagePreview" class="preview-image" alt="Preview Produk">
            </div>

            <div class="form-group">
                <label>Gender Model</label>
                <select id="gender">
                    <option value="perempuan">Perempuan</option>
                    <option value="laki-laki">Laki-laki</option>
                    <option value="androgini">Androgini / Netral</option>
                    <option value="tanpa model">Tanpa Model (Hanya Tangan/Lingkungan)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Usia Model</label>
                <select id="age">
                    <option value="dewasa muda">Dewasa Muda (18-30 tahun)</option>
                    <option value="remaja">Remaja</option>
                    <option value="dewasa matang">Dewasa Matang (30-50 tahun)</option>
                    <option value="senior">Senior (50+ tahun)</option>
                    <option value="anak-anak">Anak-anak</option>
                </select>
            </div>

            <div class="form-group">
                <label>Vibe / Ide Gila (Tema Latar)</label>
                <select id="theme">
                    <option value="studio minimalis elegan">Studio Minimalis Elegan</option>
                    <option value="kota cyberpunk neon">Kota Cyberpunk Neon Sci-Fi</option>
                    <option value="puncak gunung es bersalju">Puncak Gunung Bersalju</option>
                    <option value="hutan fantasi bercahaya">Hutan Fantasi Bercahaya (Magical)</option>
                    <option value="kafe estetik tokyo">Kafe Estetik Tokyo Pagi Hari</option>
                    <option value="luar angkasa astronot">Luar Angkasa (Dipegang Astronot)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Detail Tambahan (Opsional)</label>
                <input type="text" id="customPrompt" placeholder="Contoh: Model memakai kacamata hitam, pencahayaan dramatis...">
            </div>

            <button class="btn-generate" id="generateBtn" onclick="generateMockup()">Generate Photoshoot AI</button>
        </div>

        <div class="panel">
            <h2>2. Hasil Generate (Variasi)</h2>
            <div style="text-align: center; color: var(--text-muted); margin-bottom: 10px;" id="statusText">
                Menunggu gambar produk...
            </div>
            
            <div class="results-grid" id="resultsGrid">
                <div class="result-card" id="card1">
                    <div class="loader" id="loader1"></div>
                    <img id="resImg1" style="display: none;">
                </div>
                <div class="result-card" id="card2">
                    <div class="loader" id="loader2"></div>
                    <img id="resImg2" style="display: none;">
                </div>
                <div class="result-card" id="card3">
                    <div class="loader" id="loader3"></div>
                    <img id="resImg3" style="display: none;">
                </div>
                <div class="result-card" id="card4">
                    <div class="loader" id="loader4"></div>
                    <img id="resImg4" style="display: none;">
                </div>
            </div>
        </div>
    </div>

    <script>
        let uploadedImageBase64 = "";

        // Fungsi untuk menangani upload gambar
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedImageBase64 = e.target.result;
                    document.getElementById('uploadText').style.display = 'none';
                    const imgPreview = document.getElementById('imagePreview');
                    imgPreview.src = uploadedImageBase64;
                    imgPreview.style.display = 'block';
                    document.getElementById('statusText').innerText = "Produk siap. Silakan klik Generate!";
                }
                reader.readAsDataURL(file);
            }
        }

        // Drag and Drop Fitur
        const dropZone = document.getElementById('dropZone');
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if(file && file.type.startsWith('image/')) {
                document.getElementById('fileInput').files = e.dataTransfer.files;
                handleImageUpload({target: {files: [file]}});
            }
        });

        // Fungsi utama Generate Gambar (Simulasi API)
        async function generateMockup() {
            if (!uploadedImageBase64) {
                alert("Harap upload gambar produk Anda terlebih dahulu!");
                return;
            }

            const gender = document.getElementById('gender').value;
            const age = document.getElementById('age').value;
            const theme = document.getElementById('theme').value;
            const custom = document.getElementById('customPrompt').value;
            
            const btn = document.getElementById('generateBtn');
            const statusText = document.getElementById('statusText');

            // Susun Prompt API (Ini yang nantinya dikirim ke Backend AI)
            const finalPrompt = `A hyper-realistic photoshoot of a product held by a ${age} ${gender}, background is ${theme}. ${custom}, 8k resolution, highly detailed, photorealistic.`;
            console.log("MENGIRIM PROMPT KE API:", finalPrompt);

            // Mengubah UI menjadi mode loading
            btn.disabled = true;
            btn.innerText = "Memproses AI...";
            statusText.innerText = "AI sedang menyatukan produk dengan model...";

            // Menyalakan animasi loading di keempat card
            for(let i=1; i<=4; i++) {
                document.getElementById(`resImg${i}`).style.display = 'none';
                document.getElementById(`loader${i}`).style.display = 'block';
            }

            /* =========================================================
               BAGIAN INI ADALAH SIMULASI (MOCK) KARENA MEMBUTUHKAN BACKEND.
               Di dunia nyata, Anda akan menggunakan fetch() untuk mengirim 
               'uploadedImageBase64' dan 'finalPrompt' ke API seperti Photoroom 
               atau server Python (Stable Diffusion ControlNet) Anda sendiri.
               ========================================================= */
               
            setTimeout(() => {
                // Simulasi selesai setelah 3 detik
                // Mengambil gambar dummy acak dari Unsplash sebagai contoh hasil AI
                const dummyKeywords = [
                    "fashion,model", 
                    "cyberpunk,neon", 
                    "studio,product", 
                    "person,holding"
                ];

                for(let i=1; i<=4; i++) {
                    const imgEl = document.getElementById(`resImg${i}`);
                    const loaderEl = document.getElementById(`loader${i}`);
                    
                    // Pakai timestamp agar browser tidak nge-cache gambar yang sama
                    imgEl.src = `https://source.unsplash.com/400x400/?${dummyKeywords[i-1]}&sig=${Date.now()+i}`;
                    
                    // Saat gambar dummy selesai dimuat, hilangkan loading
                    imgEl.onload = () => {
                        loaderEl.style.display = 'none';
                        imgEl.style.display = 'block';
                    };
                }

                btn.disabled = false;
                btn.innerText = "Generate Photoshoot AI";
                statusText.innerText = `Selesai! Prompt yang digunakan: "${age} ${gender} di ${theme}"`;

            }, 3000); // Simulasi waktu tunggu 3 detik
        }
    </script>
</body>
</html>
